name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  # Allow manual triggering from the GitHub UI.
  workflow_dispatch:

# Cancel any in-flight deploy if a newer commit lands.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# Future-proof: GitHub is deprecating Node 20 on runners (Sep 2026).
# This forces composite/JS actions that target Node 20 to run on Node 24
# today, so we don't get surprised when the deprecation lands.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build (vite + Cloudflare plugin)
        # VITE_-prefixed values get inlined into the client bundle by Vite at
        # build time. These are PUBLIC (publishable / anon) keys — safe to
        # commit. The server-only SUPABASE_SERVICE_ROLE_KEY etc. are set as
        # Cloudflare Worker secrets via `wrangler secret put` (not here).
        env:
          VITE_SUPABASE_URL: https://xbxhzinnfhosoztqaaao.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_BFdJmuINpp_FQJo6L-0YZA_QMsNHT2x
          VITE_SUPABASE_PROJECT_ID: xbxhzinnfhosoztqaaao
        run: npm run build

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          # apiToken pulls from a repo secret you set in
          # GitHub → Settings → Secrets and variables → Actions
          # Create a Cloudflare API token with the
          # "Edit Cloudflare Workers" template at
          # https://dash.cloudflare.com/profile/api-tokens
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
